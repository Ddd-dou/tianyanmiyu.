<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>旅游预约 - 甜言猕语</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FDFBF7;
            font-family: 'Nunito', 'Quicksand', system-ui, sans-serif;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(163,201,90,0.08) 0px, rgba(163,201,90,0.08) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(135deg, rgba(136,176,75,0.06) 0px, rgba(136,176,75,0.06) 2px, transparent 2px, transparent 8px);
            z-index: -1;
            pointer-events: none;
        }

        :root {
            --green-dark: #88B04B;
            --green-mid: #A3C95A;
            --green-light: #D3E0B3;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 28px;
            color: var(--green-dark);
            background: white;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.06);
            cursor: pointer;
            z-index: 99;
            text-decoration: none;
            border: 2px dashed var(--green-mid);
            transition: 0.2s;
        }
        .back-btn:hover {
            transform: translateX(-2px);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.08);
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            border-radius: 48px;
            padding: 30px;
            border: 2px dashed var(--green-mid);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.06);
        }

        h2 {
            color: var(--green-dark);
            margin-bottom: 20px;
            text-align: center;
        }

        .date-section {
            margin-bottom: 25px;
        }
        .date-section strong {
            color: var(--green-dark);
        }
        .date-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .date-box {
            background: #e0e0e0;
            padding: 12px 16px;
            border-radius: 30px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .date-box.selected {
            background: var(--green-dark);
            color: white;
            border-color: var(--green-dark);
        }

        .visitor-item {
            background: #F9F9F0;
            padding: 12px;
            border-radius: 30px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed var(--green-mid);
        }

        .add-btn {
            background: var(--green-light);
            padding: 12px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            margin: 15px 0;
            font-weight: bold;
            border: 1px dashed var(--green-mid);
            transition: 0.2s;
        }
        .add-btn:hover {
            background: var(--green-mid);
            color: white;
        }

        .contact-input {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: 1px dashed var(--green-mid);
            margin: 10px 0;
            font-size: 16px;
            background: #FDFBF7;
        }
        .contact-input:focus {
            outline: none;
            border-color: var(--green-dark);
            border-style: solid;
        }

        .submit-btn {
            background: var(--green-dark);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
            transition: 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
        }

        .delete-btn {
            background: #ffcccc;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: #cc5555;
            font-size: 12px;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<a class="back-btn" href="index.html">←</a>
<div class="container">
    <h2>🏞️ 预约猕猴桃基地之旅</h2>
    
    <div class="date-section">
        <div><strong>📅 预约时间</strong></div>
        <div class="date-grid" id="dateGrid"></div>
    </div>
    
    <div><strong>👥 游客信息</strong></div>
    <div id="visitorList"></div>
    <div class="add-btn" id="addVisitorBtn">+ 添加游客信息</div>
    
    <div><strong>📞 联系方式</strong></div>
    <input type="tel" id="contactPhone" class="contact-input" placeholder="联系人电话">
    
    <div class="submit-btn" id="submitBtn">提交预约</div>
</div>
<footer>🍃 甜言猕语果园 | 体验采摘乐趣</footer>

<script>
    let selectedDate = null;
    let visitors = [];
    
    const dates = ['2026-04-27', '2026-04-28', '2026-04-29', '2026-04-30', '2026-05-01'];
    const dateGrid = document.getElementById('dateGrid');
    dates.forEach(d => {
        let box = document.createElement('div');
        box.className = 'date-box';
        box.innerText = d;
        box.onclick = () => {
            document.querySelectorAll('.date-box').forEach(b => b.classList.remove('selected'));
            box.classList.add('selected');
            selectedDate = d;
        };
        dateGrid.appendChild(box);
    });
    
    function renderVisitors() {
        const container = document.getElementById('visitorList');
        if(visitors.length === 0) {
            container.innerHTML = '<div style="color:#aaa; padding:10px;">暂无游客，请添加</div>';
            return;
        }
        container.innerHTML = visitors.map((v, idx) => `
            <div class="visitor-item">
                <span>${v.name} (${v.idType}:${v.idNum})</span>
                <span class="delete-btn" onclick="removeVisitor(${idx})">删除</span>
            </div>
        `).join('');
    }
    
    window.removeVisitor = function(idx) {
        visitors.splice(idx, 1);
        renderVisitors();
    };
    
    document.getElementById('addVisitorBtn').onclick = () => {
        let name = prompt('请输入姓名');
        if(!name) return;
        let idNum = prompt('请输入身份证号');
        if(!idNum) return;
        visitors.push({ name, idType: '身份证', idNum });
        renderVisitors();
    };
    
    document.getElementById('submitBtn').onclick = () => {
        let phone = document.getElementById('contactPhone').value.trim();
        if(!selectedDate) { alert('请选择预约日期'); return; }
        if(!phone) { alert('请填写联系电话'); return; }
        if(visitors.length === 0) { alert('请至少添加一位游客'); return; }
        alert(`预约成功！\n日期：${selectedDate}\n游客：${visitors.length}人\n电话：${phone}\n甜言猕语欢迎您！`);
        selectedDate = null;
        visitors = [];
        renderVisitors();
        document.getElementById('contactPhone').value = '';
        document.querySelectorAll('.date-box').forEach(b => b.classList.remove('selected'));
    };
    
    renderVisitors();
</script>
</body>
</html>
